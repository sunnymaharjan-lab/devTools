<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Toolkit</title>
    <!-- Using Tailwind CSS via CDN for rapid development -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5908583357149326"
     crossorigin="anonymous"></script>
    
</head>
<body class="bg-gray-100 text-gray-900 font-sans">


    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            
            <!-- Dynamic Brand Container -->
            <div id="brand-container" class="flex items-center space-x-3 cursor-pointer">
                <!-- JS will inject the logo and title here -->
            </div>

            <div id="nav-container" class="flex space-x-6">
                <!-- Links injected by JavaScript -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold mb-8 text-center">Free Business Tool Kits</h2>
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards injected by JavaScript -->
        </div>
    </main>


    <div class="ad-container no-print" style="margin: 40px 0; text-align: center;">
        <!-- google ads 2 -->
        <ins class="adsbygoogle"
            style="display:block"
            data-ad-client="ca-pub-5908583357149326"
            data-ad-slot="3222133081"
            data-ad-format="auto"
            data-full-width-responsive="true"></ins>
        <script>
            (adsbygoogle = window.adsbygoogle || []).push({});
        </script>

    </div> 
    
    <!-- Disclaimer & Footer -->
    <footer class="bg-white mt-12 border-t">
        <div class="max-w-6xl mx-auto px-4 py-8 text-center text-sm text-gray-500">
            <!-- Added ID here -->
            <p id="disclaimer-text" class="mb-4 text-xs italic">Loading disclaimer...</p>
            
            <!-- Added ID here -->
            <div id="footer-links" class="space-x-4">
                <!-- JS will inject links here -->
            </div>
        </div>
    </footer>

    <script>
        // Fetch and Render logic
        async function loadData() {
            try {
                const response = await fetch('config/config.json');
                const data = await response.json();

                // Render Brand (Logo & Title)
                const brandContainer = document.getElementById('brand-container');
                if (data.siteInfo) {
                    let brandHtml = '';
                    // Add logo if URL exists in config
                    if (data.siteInfo.logoUrl) {
                        brandHtml += `<img src="${data.siteInfo.logoUrl}" alt="Site Logo" class="h-14 w-22 object-contain">`;
                    }
                    // Add title text
                    if (data.siteInfo.title) {
                        brandHtml += `<h1 class="text-xl font-bold text-blue-600">${data.siteInfo.title}</h1>`;
                    }
                    brandContainer.innerHTML = brandHtml;
                    
                    // Optional: Make clicking the logo refresh/go home
                    brandContainer.onclick = () => window.location.href = '/';
                }                

                // Render Navigation
                const navContainer = document.getElementById('nav-container');

                data.navItems.forEach(item => {
                    const navItem = document.createElement('div');
                    navItem.className = "group relative cursor-pointer py-2 hover:text-blue-600";
                    
                    // Check if the item has children (like "Tools")
                    if (item.children) {
                        // Logic for Dropdown
                        navItem.innerHTML = `<span class="flex items-center">${item.name} ▾</span>`;
                        
                        const dropdown = document.createElement('div');
                        dropdown.className = "absolute left-0 hidden group-hover:block pt-4 z-50";
                        
                        const dropdownContent = document.createElement('div');
                        dropdownContent.className = "bg-white shadow-lg border rounded-lg py-2 w-48 text-gray-700";
                        
                        item.children.forEach(child => {
                            // Dropdown links open in a new tab
                            dropdownContent.innerHTML += `<a href="${child.url}" target="_blank" rel="noopener noreferrer" class="block px-4 py-2 hover:bg-gray-100 hover:text-blue-600">${child.name}</a>`;
                        });
                        
                        dropdown.appendChild(dropdownContent);
                        navItem.appendChild(dropdown);
                    } else {
                        // Logic for Standard Link (Home, About Us)
                        // These open in the same window
                        navItem.innerHTML = `<a href="${item.url}" class="block">${item.name}</a>`;
                    }
                    
                    navContainer.appendChild(navItem);
                });

                // Render Cards
                const grid = document.getElementById('tools-grid');
                data.tools.forEach(tool => {
                    const card = document.createElement('a');
                    card.href = tool.link;
                    card.target = "_blank";
                    card.rel = "noopener noreferrer";

                    card.className = `
                        block p-6 bg-white rounded-lg shadow-sm 
                        border border-gray-100 transition-all 
                        duration-300 hover:shadow-xl 
                        hover:-translate-y-2 hover:scale-[1.02]`;
                    card.innerHTML = `
                        <div class="mb-4 text-green-600">
                            <i data-lucide="${tool.icon}" class="w-8 h-8"></i>
                        </div>
                        <h3 class="text-2xl mb-2 text-blue-700">${tool.title}</h3>
                        <p class=" text-sm text-gray-600">${tool.description}</p>
                    `;
                    grid.appendChild(card);
                });
                lucide.createIcons();

                // Render Footer
                const disclaimer = document.getElementById('disclaimer-text');
                const footerLinksContainer = document.getElementById('footer-links');

                // Update disclaimer text
                if (data.footer) {
                    disclaimer.innerText = data.footer.disclaimer;

                    // Clear existing (if any)
                    footerLinksContainer.innerHTML = '';

                    // Render links
                    data.footer.links.forEach((link, index) => {
                        const a = document.createElement('a');
                        a.href = link.url;
                        a.className = "hover:text-blue-600";
                        a.innerText = link.name;
                        a.target = "_blank";
                        a.rel = "noopener noreferrer";
                        footerLinksContainer.appendChild(a);

                        // Add separator | if not the last item
                        if (index < data.footer.links.length - 1) {
                            const span = document.createElement('span');
                            span.innerText = "|";
                            footerLinksContainer.appendChild(span);
                        }
                    });
                }
                
            } catch (error) {
                console.error("Error loading tools:", error);
            }
        }

        loadData();
    </script>
</body>
</html>
